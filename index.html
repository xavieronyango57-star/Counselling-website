<div class="card" id="assessment">

<h2 style="margin-bottom:20px;">
🧠 Mental Health Self Assessment
</h2>

<p style="margin-bottom:20px;">
Over the last two weeks, how often have you experienced the following?
</p>

<div class="question-box">

<label>1. Feeling nervous, anxious, or on edge?</label>
<select class="question">
<option value="0">Not at all</option>
<option value="1">Several days</option>
<option value="2">More than half the days</option>
<option value="3">Nearly every day</option>
</select>

<label>2. Feeling down, depressed, or hopeless?</label>
<select class="question">
<option value="0">Not at all</option>
<option value="1">Several days</option>
<option value="2">More than half the days</option>
<option value="3">Nearly every day</option>
</select>

<label>3. Trouble falling or staying asleep?</label>
<select class="question">
<option value="0">Not at all</option>
<option value="1">Several days</option>
<option value="2">More than half the days</option>
<option value="3">Nearly every day</option>
</select>

<label>4. Feeling tired or having little energy?</label>
<select class="question">
<option value="0">Not at all</option>
<option value="1">Several days</option>
<option value="2">More than half the days</option>
<option value="3">Nearly every day</option>
</select>

<label>5. Difficulty concentrating on tasks?</label>
<select class="question">
<option value="0">Not at all</option>
<option value="1">Several days</option>
<option value="2">More than half the days</option>
<option value="3">Nearly every day</option>
</select>

<button onclick="calculateAssessment()" class="assessment-btn">
View My Results
</button>

<div id="assessmentResult"></div>

<div id="bookNowContainer" style="display:none;">
<a href="#booking" class="book-now-btn">
Book a Counselling Session
</a>
</div>

</div>

<style>

.question-box label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:600;
}

.question-box select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:10px;
}

.assessment-btn{
width:100%;
padding:15px;
margin-top:20px;
background:#2f7a22;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.assessment-btn:hover{
background:#245d1a;
}

#assessmentResult{
margin-top:25px;
padding:20px;
border-radius:10px;
font-weight:600;
display:none;
}

.book-now-btn{
display:block;
text-align:center;
background:#0d6efd;
color:white;
padding:15px;
border-radius:8px;
text-decoration:none;
margin-top:20px;
font-weight:bold;
}

</style>

<script>

function calculateAssessment(){

const questions =
document.querySelectorAll(".question");

let total = 0;

questions.forEach(question => {
total += Number(question.value);
});

const resultBox =
document.getElementById("assessmentResult");

const bookingButton =
document.getElementById("bookNowContainer");

let message = "";

if(total <= 4){

message =
"✅ Low emotional distress detected. Continue practicing self-care, maintaining healthy relationships, and monitoring your wellbeing.";

resultBox.style.background =
"#d1e7dd";

resultBox.style.color =
"#0f5132";

bookingButton.style.display =
"none";

}

else if(total <= 8){

message =
"🟡 Mild emotional distress detected. Consider speaking with a counsellor if symptoms continue or begin affecting daily life.";

resultBox.style.background =
"#fff3cd";

resultBox.style.color =
"#664d03";

bookingButton.style.display =
"block";

}

else if(total <= 12){

message =
"🟠 Moderate emotional distress detected. Professional counselling may be beneficial to help you manage stress and emotional challenges.";

resultBox.style.background =
"#ffe5b4";

resultBox.style.color =
"#7a4100";

bookingButton.style.display =
"block";

}

else{

message =
"🔴 High emotional distress detected. We strongly recommend scheduling a counselling session with a qualified mental health professional.";

resultBox.style.background =
"#f8d7da";

resultBox.style.color =
"#842029";

bookingButton.style.display =
"block";

}

resultBox.style.display =
"block";

resultBox.innerHTML =
"<strong>Your Score: " +
total +
"/15</strong><br><br>" +
message;

}

</script>
